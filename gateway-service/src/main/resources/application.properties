spring.application.name=gateway-service

# Tomcat thread pool for handling concurrent requests
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=50
server.tomcat.max-connections=8192
server.tomcat.accept-count=100

# Phase 2 default: call Ray Serve via HTTP
inference.base-url=${INFERENCE_BASE_URL:http://localhost:8000}

# Force simple HTTP client to avoid HTTP/2 compatibility issues with Ray Serve
spring.http.client.factory=simple

# HTTP Client connection pool for inference service
# Max connections: Hard limit on concurrent HTTP requests to Ray.
inference.http.max-connections=100
inference.http.connect-timeout=1000
# Read timeout: 450ms aligns with WebClient responseTimeout (hard socket kill).
inference.http.read-timeout=450
# Write timeout for large payloads (e.g., image search).
inference.http.write-timeout=1000
# NOTE: pendingAcquireMaxCount and pendingAcquireTimeout are NOT configurable here.
# Both are hardcoded to 0/ZERO in InferenceClientConfig so the connection pool
# never queues acquisition attempts.  The executor bulkhead (64 threads + 100 queue)
# is the sole concurrency gate.  Any overflow is rejected immediately, not buffered.

# Recommendation result enrichment executor (Stage 2: blocking Redis + Caffeine work).
# These threads handle product-metadata lookup and rec-cache reads/writes after Ray
# inference completes.  Sized for typical Redis latencies (1–5 ms).
# Overflow → RejectedExecutionException → onErrorResume → popular-items fallback.
recommendation.cache.executor.core-pool-size=8
recommendation.cache.executor.max-pool-size=32
recommendation.cache.executor.queue-capacity=200

# Kafka topic names
kafka.topics.clicks=${KAFKA_TOPIC_CLICKS:scalestyle.clicks}

# Dedicated executor for broker-acknowledged click tracking.
# HTTP 200 is returned only after the Kafka broker acknowledges the publish.
# HTTP 503 is returned on executor saturation, broker ACK timeout, or publish failure.
# This is not fire-and-forget: the executor worker blocks on broker ACK
# within event.producer.kafka.ack-timeout-ms before resolving the request.
event.producer.executor.core-pool-size=4
event.producer.executor.max-pool-size=8
event.producer.executor.queue-capacity=200

# Kafka producer retry budget for best-effort click tracking.
# Keep acks=all and idempotence, but bound retries so publish failures become
# visible within seconds instead of hiding behind effectively infinite retry tails.
event.producer.kafka.retries=3
event.producer.kafka.request-timeout-ms=5000
event.producer.kafka.delivery-timeout-ms=5500
event.producer.kafka.retry-backoff-ms=250
event.producer.kafka.retry-backoff-max-ms=1000
# Small click payload tuning:
# - lz4: lower CPU cost than gzip for tiny JSON events
# - 2 ms linger: light coalescing without adding much tail latency
# - 8 KiB batch: enough for short bursts, avoids throughput-oriented oversizing
event.producer.kafka.linger-ms=2
event.producer.kafka.batch-size-bytes=8192
event.producer.kafka.max-in-flight-requests=5
event.producer.kafka.compression-type=lz4

# Degraded recommendation fallback uses the same online popularity model as the
# serving stack: materialized rolling windows, not the legacy all-time key.
# Primary window should be hot and recent; secondary window is a wider safety net.
recommendation.fallback.popularity.materialized-prefix=popularity:materialized
recommendation.fallback.popularity.primary-window=24h
recommendation.fallback.popularity.secondary-window=7d
recommendation.fallback.popularity.window.1h.bucket-seconds=300
recommendation.fallback.popularity.window.24h.bucket-seconds=3600
recommendation.fallback.popularity.window.7d.bucket-seconds=86400

# Redis connection
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2

# Two-tier cache configuration
cache.local.max-size=${CACHE_LOCAL_MAX_SIZE:1000}
cache.local.ttl-minutes=${CACHE_LOCAL_TTL_MINUTES:5}

# Actuator endpoints - expose prometheus metrics
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# Enable Kubernetes health probes (readiness/liveness)
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# Resilience4j configuration for Ray inference service
# TimeLimiter config removed to match code (uses HTTP client 450ms timeout + sync wrapper 800ms timeout)
# CircuitBreaker: Open circuit if 50% of recent calls fail
resilience4j.circuitbreaker.instances.ray.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.ray.sliding-window-size=50
resilience4j.circuitbreaker.instances.ray.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.ray.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.ray.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.ray.permitted-number-of-calls-in-half-open-state=5
# Record all common HTTP and timeout exceptions (don't wrap them!)
resilience4j.circuitbreaker.instances.ray.record-exceptions=\
  java.util.concurrent.TimeoutException,\
  org.springframework.web.reactive.function.client.WebClientRequestException,\
  io.github.resilience4j.circuitbreaker.CallNotPermittedException

resilience4j.circuitbreaker.instances.ray.ignore-exceptions=\
  org.springframework.web.reactive.function.client.WebClientResponseException$BadRequest,\
  org.springframework.web.reactive.function.client.WebClientResponseException$UnprocessableEntity


# Enable Resilience4j metrics
management.metrics.tags.application=${spring.application.name}
resilience4j.circuitbreaker.instances.ray.register-health-indicator=true

# OpenTelemetry distributed tracing configuration (AI Infra interview requirement)
# Enable trace propagation to inference-service for end-to-end observability
otel.service.name=gateway-service
otel.traces.exporter=otlp
otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://jaeger:4317}
otel.exporter.otlp.protocol=grpc
otel.metrics.exporter=none
otel.logs.exporter=none
# Propagate trace context via HTTP headers (traceparent, tracestate)
otel.propagators=tracecontext,baggage