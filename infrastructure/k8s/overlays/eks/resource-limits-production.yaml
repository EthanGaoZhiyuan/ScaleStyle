---
# Production resource limits for AWS EKS
# Optimized for HA (2+ replicas) and higher concurrency

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: scalestyle
spec:
  template:
    spec:
      containers:
      - name: gateway
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "1Gi"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference
  namespace: scalestyle
spec:
  template:
    spec:
      containers:
      - name: inference
        # INFRA-01 CPU budget after removing the EKS inference HPA:
        # router 0.05 + ingress 1-3 x 0.25 + embedding 0.5 + retrieval 0.25
        # + popularity 0.05 + reranker 0.25 + generation 0.05 + optional vision 0.1
        # = 1.5 vCPU minimum and 2.0 vCPU max declared Ray footprint per pod.
        resources:
          requests:
            cpu: "1000m"
            memory: "5Gi"
          limits:
            cpu: "2"
            memory: "8Gi"  # memory_limit >= RAY_MEMORY_GB + RAY_OBJECT_STORE_GB + model_weights + 1GB_overhead
                             # = 5.0 + 1.0 + 1.3 (BGE) + 0.09 (reranker) + ~0.5 (runtime) ≈ 7.9 GB

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-consumer-primary
  namespace: scalestyle
spec:
  template:
    spec:
      containers:
      - name: event-consumer
        resources:
          requests:
            cpu: "200m"
            memory: "384Mi"
          limits:
            cpu: "1000m"
            memory: "768Mi"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-consumer-retry
  namespace: scalestyle
spec:
  template:
    spec:
      containers:
      - name: event-consumer-retry
        resources:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
