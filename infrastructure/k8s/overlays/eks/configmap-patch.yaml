---
# ConfigMap patch for EKS production
# Disables generation to reduce memory footprint from ~6.5GB to ~2.7GB
#
# Memory breakdown with GENERATION_ENABLED=0:
#   - BAAI/bge-large-en-v1.5 (FP32):           ~1.3 GB
#   - cross-encoder/ms-marco-MiniLM-L-6-v2:    ~91 MB
#   - Ray runtime + 0.5GB object store:        ~1.3 GB
#   Total:                                     ~2.7 GB (fits in 4Gi limit)
#
# To re-enable generation in production:
#   1. Change GENERATION_ENABLED to "1"
#   2. Set RAY_MEMORY_GB: "6.0" and RAY_OBJECT_STORE_GB: "1.0"
#   3. Increase memory limit in resource-limits-production.yaml to 8-10Gi
#   4. Ensure EKS node group has t3.xlarge or larger instances
apiVersion: v1
kind: ConfigMap
metadata:
  name: scalestyle-config
  namespace: scalestyle
data:
  GENERATION_ENABLED: "0"
  # Ray memory: production profile without generation
  RAY_MEMORY_GB: "2.5"
  RAY_OBJECT_STORE_GB: "0.5"
