apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: scalestyle-kafka
  namespace: kafka-system
spec:
  kafka:
    version: 3.7.0
    replicas: 3
    listeners:
      - name: tls
        port: 9093
        type: internal
        tls: true
        authentication:
          type: scram-sha-512
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      inter.broker.protocol.version: "3.7"
      auto.create.topics.enable: false
    storage:
      type: persistent-claim
      class: gp3
      size: 20Gi
      deleteClaim: false
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 2Gi
  zookeeper:
    replicas: 3
    storage:
      type: persistent-claim
      class: gp3
      size: 10Gi
      deleteClaim: false
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
  entityOperator:
    topicOperator: {}
    userOperator: {}