apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kafka-broker-ingress
  namespace: kafka-system
spec:
  podSelector:
    matchLabels:
      strimzi.io/name: scalestyle-kafka-kafka
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: scalestyle
          podSelector:
            matchExpressions:
              - key: component
                operator: In
                values:
                  - gateway
                  - event-consumer
      ports:
        - protocol: TCP
          port: 9093
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kafka-system
