apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: scalestyle-clicks-dlq
  namespace: kafka-system
  labels:
    strimzi.io/cluster: scalestyle-kafka
spec:
  topicName: scalestyle.clicks.dlq
  partitions: 12
  replicas: 3
  config:
    min.insync.replicas: 2
    # Retain DLQ messages for 14 days to allow manual inspection and replay
    retention.ms: 1209600000
    segment.bytes: 1073741824
