---
# Production replica counts (higher than Minikube)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: scalestyle
spec:
  replicas: 2

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference
  namespace: scalestyle
spec:
  replicas: 2  # Fixed EKS pod count; Ray Serve scales only in-pod actors for inference.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-consumer-primary
  namespace: scalestyle
spec:
  replicas: 2

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-consumer-retry
  namespace: scalestyle
spec:
  replicas: 1
