---
# Inference Deployment: Ray Serve for ML inference
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference
  namespace: scalestyle
  labels:
    app: scalestyle
    component: inference
    version: "1.0"
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: scalestyle
      component: inference
  template:
    metadata:
      labels:
        app: scalestyle
        component: inference
        version: "1.0"
      annotations:
        # Prometheus scraping annotations
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        fsGroup: 1000  # scalestyle group from Dockerfile
      
      containers:
      - name: inference
        # Base must never point at a deployable local/dev image. Every overlay
        # is required to rewrite this placeholder via Kustomize images:.
        image: scalestyle-inference:__MUST_BE_OVERRIDDEN_BY_KUSTOMIZE__
        imagePullPolicy: IfNotPresent
        env:
        - name: PROMETHEUS_MULTIPROC_DIR
          value: /tmp/prometheus_multiproc
        
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        - name: dashboard
          containerPort: 8265
          protocol: TCP
        
        # Note: Warmup mechanism should be implemented in application code
        # postStart hook blocks container startup, delaying probes
        # Recommended: Add warmup logic after model loading in Ray Serve deployment
        
        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: scalestyle-config
        - configMapRef:
            name: scalestyle-cloud-config
            optional: true
        
        resources:
          requests:
            cpu: "1000m"
            memory: "2Gi"
          limits:
            cpu: "4000m"
            memory: "8Gi"
        
        # Startup uses /readyz, not /healthz, so the pod is not considered started
        # until the service can actually serve model-backed traffic. This avoids
        # a rollout declaring success while models are still cold-loading.
        startupProbe:
          httpGet:
            path: /readyz
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 40
        
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
        
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        
        # Model/Hugging Face cache is PVC-backed so restarts and rolling updates
        # reuse warmed artifacts instead of re-downloading them into emptyDir.
        volumeMounts:
        - name: hf-cache
          mountPath: /cache/huggingface
        - name: prometheus-multiproc
          mountPath: /tmp/prometheus_multiproc
      
      volumes:
      - name: hf-cache
        persistentVolumeClaim:
          claimName: inference-model-cache
      - name: prometheus-multiproc
        emptyDir: {}

---
# Inference Service: ClusterIP for internal access
apiVersion: v1
kind: Service
metadata:
  name: inference
  namespace: scalestyle
  labels:
    app: scalestyle
    component: inference
spec:
  type: ClusterIP
  selector:
    app: scalestyle
    component: inference
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
  - name: dashboard
    port: 8265
    targetPort: 8265
    protocol: TCP
  sessionAffinity: None
