apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ScaleStyle Base Configuration
# Contains all environment-agnostic Kubernetes resources

namespace: scalestyle

resources:
  - namespace.yaml
  - configmap.yaml
  - redis.yaml
  - redis-pvc.yaml
  - inference-model-cache-pvc.yaml
  - inference.yaml
  - inference-hpa.yaml
  - inference-pdb.yaml
  - gateway.yaml
  - gateway-hpa.yaml
  - event-consumer.yaml
  - event-consumer-primary-hpa.yaml
  - event-consumer-retry.yaml
  - ingress.yaml
  - jaeger.yaml
  - init-job.yaml

# Common labels applied to all resources
commonLabels:
  app: scalestyle
  managed-by: kustomize

# Images will be configured in overlays (minikube/eks specific)
