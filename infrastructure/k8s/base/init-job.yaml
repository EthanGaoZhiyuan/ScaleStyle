---
# Data Initialization Job: Load data into Redis and Milvus
# Fix: Uses pre-built image with dependencies for fast, reliable initialization
apiVersion: batch/v1
kind: Job
metadata:
  name: data-init
  namespace: scalestyle
  labels:
    app: scalestyle
    component: data-init
spec:
  # Keep job history for debugging
  ttlSecondsAfterFinished: 3600  # Clean up after 1 hour
  backoffLimit: 3  # Retry up to 3 times on failure
  
  template:
    metadata:
      labels:
        app: scalestyle
        component: data-init
    spec:
      restartPolicy: OnFailure
      
      # Init containers to wait for dependencies
      initContainers:
      - name: wait-for-redis
        image: busybox:1.35
        envFrom:
        - configMapRef:
            name: scalestyle-config
        - configMapRef:
            name: scalestyle-cloud-config
            optional: true
        command:
        - sh
        - -c
        - |
          echo "Waiting for Redis..."
          until nc -z "$REDIS_HOST" "$REDIS_PORT"; do
            echo "Redis not ready, sleeping..."
            sleep 2
          done
          echo "Redis is ready!"
      
      - name: wait-for-milvus
        image: busybox:1.35
        envFrom:
        - configMapRef:
            name: scalestyle-config
        - configMapRef:
            name: scalestyle-cloud-config
            optional: true
        command:
        - sh
        - -c
        - |
          echo "Waiting for Milvus..."
          until nc -z "$MILVUS_HOST" "$MILVUS_PORT"; do
            echo "Milvus not ready, sleeping..."
            sleep 5
          done
          echo "Milvus is ready!"
      
      containers:
      - name: data-loader
        # Fix: Use pre-built image with dependencies baked in
        # Contract: placeholder tag MUST be replaced by Kustomize overlay images[].
        image: scalestyle-data-init:__MUST_BE_OVERRIDDEN_BY_KUSTOMIZE__
        imagePullPolicy: IfNotPresent
        
        # Run bootstrap script from the image
        command: ["python", "-m", "src.bootstrap_data"]
        
        # Arguments for bootstrap script
        args:
        - "--skip-milvus"  # Skip Milvus for now (only load Redis)
        - "--no-verify"    # Skip verification (faster)
        
        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: scalestyle-config
        - configMapRef:
          name: scalestyle-cloud-config
          optional: true
        
        # Resource limits
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
      
      # Optional: Mount data files from PVC
      # volumes:
      # - name: data-files
      #   persistentVolumeClaim:
      #     claimName: scalestyle-data-pvc

