version: '3.8'

# ScaleStyle Docker Compose - Local Development Stack
#
# Port Mapping Summary (Host:Container):
#   - Gateway:              8080:8080  (API)
#   - Inference:            8000:8000  (Recommendations + Metrics)
#   - Event Consumer (Pri): 8081:8000  (Metrics)
#   - Event Consumer (Ret): 8082:8000  (Metrics)
#   - Milvus:               19530:19530 (Vector DB)
#   - Redis:                6379:6379  (Cache)
#   - Kafka:                9092:9092  (Events)
#   - Prometheus:           9090:9090  (Metrics)
#   - Grafana:              3000:3000  (Dashboards)
#   - Jaeger:               16686:16686 (Tracing UI)
#
# Usage:
#   docker-compose up -d
#   Access API: http://localhost:8080/api/recommendation/search?query=dress
#   Access Metrics:
#     - Inference:  http://localhost:8000/metrics
#     - Consumer 1: http://localhost:8081/metrics
#     - Consumer 2: http://localhost:8082/metrics

services:
  # ==========================================
  # 1. Java Gateway Service (Spring Boot)
  # ==========================================
  gateway-service:
    container_name: scalestyle-gateway
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - INFERENCE_BASE_URL=http://inference-service:8000
      - METADATA_PATH=/app/data/product_metadata.json
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Kafka configuration
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_SECURITY_PROTOCOL=PLAINTEXT  # Local dev only; overridden to SASL_SSL in k8s/production
      # OpenTelemetry configuration
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    volumes:
      - ./data-pipeline/data/processed:/app/data
    depends_on:
      kafka:
        condition: service_started
      inference-service:
        condition: service_healthy
    networks:
      - scalestyle-net

  # ==========================================
  # 2. Python Inference Service (gRPC + Ray Logic)
  # ==========================================
  inference-service:
    container_name: scalestyle-inference
    build:
      context: ./inference-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - MILVUS_COLLECTION=scale_style_bge_v2
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Ray memory configuration (local dev with generation enabled)
      - RAY_MEMORY_GB=6.0
      - RAY_OBJECT_STORE_GB=1.0
      # HF cache in container
      - HF_HOME=/cache/huggingface
      - TRANSFORMERS_CACHE=/cache/huggingface/hub
      # ----- Embedding tuning -----
      - EMBEDDING_MODEL=BAAI/bge-large-en-v1.5
      - EMBEDDING_MAX_LEN=512
      - EMBEDDING_NUM_GPUS=0

      # ----- Popularity -----
      - POPULARITY_KEY=global:popular

      # ----- Reranker (unified RERANKER_* prefix for consistency) -----
      - RECALL_K=100
      - RETRIEVAL_TIMEOUT_MS=800
      - EMBEDDING_TIMEOUT_MS=1200
      - RERANKER_ENABLED=1
      - RERANKER_MODEL=BAAI/bge-reranker-base
      - RERANKER_DEVICE=cpu
      - RERANKER_BATCH_SIZE=32
      - RERANKER_MAX_DOCS=100
      - RERANKER_MODE=cross-encoder
      - RERANKER_TIMEOUT_MS=1200
      - RERANKER_WARMUP=1
      - RAY_SERVE_RUN_SYNC_IN_THREADPOOL=1
      - HF_HUB_DISABLE_TELEMETRY=1
      - TOKENIZERS_PARALLELISM=false
      
      # ----- Behavior Boost (configurable) -----
      - EXACT_CLICK_BOOST=1.5           # Multiplier for exact item match
      - CATEGORY_AFFINITY_BOOST=1.2     # Multiplier for category affinity
      - MAX_RECENT_CLICKS_USED=20       # Max recent clicks to consider
      - PERSONALIZATION_ENABLED=true    # Toggle personalization on/off
      
      # ----- OpenTelemetry Tracing -----
      # Fix: Unified format with scheme (consistent with gateway)
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=inference-service
      # ----- Ray gRPC Configuration (Fix SSL handshake errors) -----
      - GRPC_ENABLE_FORK_SUPPORT=1
      - RAY_grpc_enable_http_proxy=0
      - RAY_BACKEND_LOG_LEVEL=warning
      - RAY_tls_server_cert=""
      - RAY_tls_server_key=""
      - RAY_tls_ca_cert=""
    volumes:
      - ./data-pipeline/data/processed/top_items_parquet:/app/data/top_items_parquet
      - hf_cache:/cache/huggingface
    depends_on:
      milvus:
        condition: service_healthy  # Wait for Milvus health check to pass
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz').read()"]
      interval: 15s
      timeout: 10s
      retries: 50  # Increased retry count (from 30 to 50)
      start_period: 120s  # Allow more time for model loading (from 60s to 120s)
    restart: unless-stopped
    networks:
      - scalestyle-net

  # ==========================================
  # 3. MinIO (S3 Compatible Storage - Object Store)
  # ==========================================
  minio:
    container_name: scalestyle-minio
    image: minio/minio:RELEASE.2024-01-13T07-53-03Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # API Port
      - "9001:9001" # Console UI Port
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    networks:
      - scalestyle-net
  # ==========================================
  # 4. Etcd (Required by Milvus)
  # ==========================================
  etcd:
    container_name: scalestyle-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=8589934592
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: >
      etcd
      -advertise-client-urls=http://etcd:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir /etcd
    networks:
      - scalestyle-net
  # ==========================================
  # 5. Milvus (Vector Database)
  # ==========================================
  milvus:
    container_name: scalestyle-milvus
    image: milvusdb/milvus:v2.3.3
    command: milvus run standalone
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530" # gRPC Port
      - "9091:9091"   # HTTP Port
    depends_on:
      - etcd
      - minio
    # Production-grade health check: ensure Milvus is truly ready
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s  # Give Milvus 30 seconds to start
    restart: unless-stopped
    networks:
      - scalestyle-net
  # ==========================================
  # 6. Attu (Milvus GUI)
  # ==========================================
  attu:
    container_name: scalestyle-attu
    image: zilliz/attu:latest 
    environment:
      MILVUS_URL: milvus:19530
    ports:
      - "8088:3000"
    depends_on:
      - milvus
    networks:
      - scalestyle-net
  # ==========================================
  # 7. Redis (In-Memory Data Store)
  # Persistence: AOF (append-only file) + RDB snapshots for durability
  # ==========================================
  redis:
    container_name: scalestyle-redis
    image: redis:7.0-alpine
    # Enable AOF persistence for event deduplication correctness
    # - appendonly yes: log every write operation
    # - appendfsync everysec: fsync every second (balance durability/performance)
    # - save config: RDB snapshots at 60s/1000 ops and 300s/100 ops
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 60 1000
      --save 300 100
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data  # Mount persistent volume for AOF and RDB files
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - scalestyle-net

  # ==========================================
  # 7. Zookeeper (Kafka coordination)
  # Real-time behavior loop
  # ==========================================
  zookeeper:
    container_name: scalestyle-zookeeper
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - scalestyle-net

  # ==========================================
  # 8. Kafka (Event streaming)
  # Real-time behavior loop
  # ==========================================
  kafka:
    container_name: scalestyle-kafka
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 168  # 7 days
      KAFKA_COMPRESSION_TYPE: gzip
    networks:
      - scalestyle-net

  # ==========================================
  # 9. Event Consumer - Primary (Kafka consumer for main traffic)
  # Real-time behavior loop - main traffic path
  # ==========================================
  event-consumer-primary:
    container_name: scalestyle-event-consumer-primary
    build:
      context: ./event-consumer
      dockerfile: Dockerfile
    ports:
      - "8081:8000"  # Metrics endpoint (host port 8081 to avoid conflict with inference-service)
    environment:
      - CONSUMER_MODE=primary
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_SECURITY_PROTOCOL=PLAINTEXT  # Local dev only; overridden to SASL_SSL in k8s/production
      - KAFKA_TOPIC=scalestyle.clicks
      - KAFKA_RETRY_TOPIC=scalestyle.clicks.retry
      - KAFKA_GROUP_ID=event-consumer
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RECENT_CLICKS_MAX=100
      - AFFINITY_DECAY_DAYS=7
      - LOG_INTERVAL=100
      - METRICS_PORT=8000
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - scalestyle-net

  # ==========================================
  # 10. Event Consumer - Retry (Kafka consumer for retry traffic)
  # Handles transient failures with exponential backoff
  # ==========================================
  event-consumer-retry:
    container_name: scalestyle-event-consumer-retry
    build:
      context: ./event-consumer
      dockerfile: Dockerfile
    ports:
      - "8082:8000"  # Metrics endpoint (host port 8082 to avoid conflicts)
    environment:
      - CONSUMER_MODE=retry
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_SECURITY_PROTOCOL=PLAINTEXT  # Local dev only; overridden to SASL_SSL in k8s/production
      - KAFKA_TOPIC=scalestyle.clicks
      - KAFKA_RETRY_TOPIC_1S=scalestyle.clicks.retry.1s
      - KAFKA_RETRY_TOPIC_10S=scalestyle.clicks.retry.10s
      - KAFKA_RETRY_TOPIC_60S=scalestyle.clicks.retry.60s
      - KAFKA_DLQ_TOPIC=scalestyle.clicks.dlq
      - KAFKA_GROUP_ID=event-consumer
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MAX_RETRIES=3
      - RETRY_ENFORCE_DELAY=true
      - RECENT_CLICKS_MAX=100
      - AFFINITY_DECAY_DAYS=7
      - LOG_INTERVAL=100
      - METRICS_PORT=8000
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - scalestyle-net

  # ==========================================
  # 11. Jaeger (Distributed Tracing)
  # ==========================================
  jaeger:
    container_name: scalestyle-jaeger
    image: jaegertracing/all-in-one:1.55
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - scalestyle-net

  # ==========================================
  # 11. Prometheus (Metrics Collection)
  # ==========================================
  prometheus:
    container_name: scalestyle-prometheus
    image: prom/prometheus:v2.51.2
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    depends_on:
      - gateway-service
      - inference-service
    networks:
      - scalestyle-net

  # ==========================================
  # 12. Grafana (Metrics Visualization)
  # ==========================================
  grafana:
    container_name: scalestyle-grafana
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      # Auto-provision datasources and dashboards
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      # P2 Fix: Mount provisioning configurations as read-only to prevent accidental modification
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      # Mount dashboard JSON files as read-only
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - scalestyle-net

# Define volumes (Persist MinIO data)
volumes:
  minio_data:
  etcd_data:
  milvus_data:
  redis_data:
  hf_cache:
  prometheus_data:
  grafana_data:

# Define networks (Enable communication between containers)
networks:
  scalestyle-net:
    driver: bridge