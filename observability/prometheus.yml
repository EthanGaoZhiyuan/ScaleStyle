global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "event-consumer-alerts.yaml"

scrape_configs:
  # Gateway Service (Spring Boot with Micrometer)
  - job_name: 'gateway-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['gateway-service:8080']
        labels:
          service: 'gateway'
          env: 'development'

  # Inference Service (Python with prometheus_client)
  - job_name: 'inference-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['inference-service:8000']
        labels:
          service: 'inference'
          env: 'development'

  # Event Consumer (primary + retry; both expose /metrics on port 8000)
  - job_name: 'event-consumer-primary'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['event-consumer-primary:8000']
        labels:
          service: 'event-consumer'
          mode: 'primary'
          env: 'development'
  - job_name: 'event-consumer-retry'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['event-consumer-retry:8000']
        labels:
          service: 'event-consumer'
          mode: 'retry'
          env: 'development'
